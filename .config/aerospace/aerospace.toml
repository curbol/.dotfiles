# Reference links
# https://nikitabobko.github.io/AeroSpace/guide#default-config
# https://nikitabobko.github.io/AeroSpace/commands
# https://nikitabobko.github.io/AeroSpace/goodies

after-startup-command = []

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 0

default-root-container-layout = 'tiles'

default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = true

[gaps]
inner.horizontal = 6
inner.vertical = 6
outer.bottom = 6
outer.top = 6
outer.right = 6
outer.left = 6

[mode.main.binding]

# Window management (matches Hyprland SUPER+key)
cmd-w = 'close'
cmd-f = 'fullscreen'
cmd-t = 'layout floating tiling'
cmd-o = 'layout floating tiling'
cmd-j = 'split horizontal'
cmd-minus = 'resize smart -50'
cmd-equal = 'resize smart +50'

# Focus (matches Hyprland SUPER+arrows)
cmd-left  = 'focus left'
cmd-down  = 'focus down'
cmd-up    = 'focus up'
cmd-right = 'focus right'

# Move window (matches Hyprland SUPER+SHIFT+arrows)
cmd-shift-left  = 'move left'
cmd-shift-down  = 'move down'
cmd-shift-up    = 'move up'
cmd-shift-right = 'move right'

# Workspaces (matches Hyprland SUPER+number)
cmd-1 = 'workspace 1'
cmd-2 = 'workspace 2'
cmd-3 = 'workspace 3'
cmd-4 = 'workspace 4'
cmd-5 = 'workspace 5'
cmd-6 = 'workspace 6'
cmd-7 = 'workspace 7'
cmd-8 = 'workspace 8'
cmd-9 = 'workspace 9'

# Move window to workspace (matches Hyprland SUPER+SHIFT+number)
cmd-shift-1 = 'move-node-to-workspace 1'
cmd-shift-2 = 'move-node-to-workspace 2'
cmd-shift-3 = 'move-node-to-workspace 3'
cmd-shift-4 = 'move-node-to-workspace 4'
cmd-shift-5 = 'move-node-to-workspace 5'
cmd-shift-6 = 'move-node-to-workspace 6'
cmd-shift-7 = 'move-node-to-workspace 7'
cmd-shift-8 = 'move-node-to-workspace 8'
cmd-shift-9 = 'move-node-to-workspace 9'

# Workspace navigation (matches Hyprland SUPER+TAB / SUPER+SHIFT+TAB)
cmd-tab       = 'workspace --wrap-around next'
cmd-shift-tab = 'workspace --wrap-around prev'

# App shortcuts (matches Hyprland SUPER+SHIFT+letter pattern)
cmd-shift-b = 'exec-and-forget open -a "Zen Browser"'
cmd-shift-s = 'exec-and-forget open -a /Applications/Slack.app'
cmd-shift-n = 'exec-and-forget open -a /Applications/Notion.app'
cmd-shift-t = 'exec-and-forget open -a /Applications/Ghostty.app'
cmd-shift-m = 'exec-and-forget open -a /Applications/Messages.app'

# Workspace 1: Notion, Slack
[[on-window-detected]]
if.app-id = 'notion.id'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['move-node-to-workspace 1']

# Workspace 2: Terminal
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = ['move-node-to-workspace 2']

# Workspace 3: Discord, Messages
[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = ['move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = ['move-node-to-workspace 3']

# force certain workspaces to certain monitors
[workspace-to-monitor-force-assignment]
1 = 'main'
2 = 'main'
3 = 'main'
4 = 'main'
5 = 'main'
6 = 'main'
7 = 'main'
8 = 'main'
9 = 'secondary'
