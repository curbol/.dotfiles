# Extra autostart processes
# exec-once = uwsm-app -- my-service
exec-once = uwsm app -- hyprsunset
exec-once = sleep 3 && pactl load-module module-loopback latency_msec=50 source=alsa_input.pci-0000_0a_00.4.analog-stereo
exec-once = sleep 2 && hyprctl keyword monitor HDMI-A-1,3840x2160@119.88,auto,1
